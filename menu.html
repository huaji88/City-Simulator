<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>大蒜酒店 - 在线点餐</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#e63946',
                        secondary: '#457b9d',
                        accent: '#f1faee',
                        dark: '#1d3557',
                        light: '#f8f9fa'
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .content-auto {
                content-visibility: auto;
            }
            .menu-card {
                @apply bg-white rounded-lg shadow-md overflow-hidden transition-all duration-300 hover:shadow-lg;
            }
            .btn-primary {
                @apply bg-primary text-white px-4 py-2 rounded-md hover:bg-opacity-90 transition-all;
            }
            .btn-secondary {
                @apply bg-secondary text-white px-4 py-2 rounded-md hover:bg-opacity-90 transition-all;
            }
            .quantity-btn {
                @apply w-8 h-8 flex items-center justify-center rounded-full border border-gray-300 hover:bg-gray-100 transition-all;
            }
            .receipt {
                @apply bg-white p-6 rounded-lg shadow-lg max-w-md mx-auto text-center;
            }
            .receipt-header {
                @apply border-b border-gray-200 pb-4 mb-4;
            }
            .receipt-item {
                @apply flex justify-between py-1;
            }
            .receipt-total {
                @apply font-bold pt-2 border-t border-gray-200 mt-2;
            }
        }
    </style>
</head>
<body class="bg-gray-50 font-sans">
    <!-- 头部 -->
    <header class="bg-dark text-white shadow-lg">
        <div class="container mx-auto px-4 py-6">
            <div class="flex flex-col md:flex-row justify-between items-center">
                <div class="text-center md:text-left mb-4 md:mb-0">
                    <h1 class="text-4xl font-bold mb-2">大蒜酒店</h1>
                    <p class="text-gray-300">美味佳肴，等您品尝</p>
                </div>
                <div class="flex items-center">
                    <i class="fa fa-phone-square text-2xl mr-2"></i>
                    <span>订餐电话：0577-8888 8888</span>
                </div>
            </div>
        </div>
    </header>

    <!-- 主内容区 -->
    <main class="container mx-auto px-4 py-8">
        <div class="flex flex-col lg:flex-row gap-8">
            <!-- 菜品展示区 -->
            <div class="lg:w-2/3">
                <h2 class="text-2xl font-bold mb-6 pb-2 border-b-2 border-primary">菜单列表</h2>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <!-- 菜品将通过JS动态生成 -->
                </div>
            </div>

            <!-- 订单和结算区 -->
            <div class="lg:w-1/3">
                <div class="bg-white rounded-lg shadow-lg p-6 sticky top-4">
                    <h2 class="text-2xl font-bold mb-4 pb-2 border-b border-gray-200">我的订单</h2>
                    
                    <div id="order-items" class="max-h-64 overflow-y-auto mb-4">
                        <p class="text-gray-500 text-center py-4">请选择菜品</p>
                    </div>

                    <div class="border-t border-gray-200 pt-4 mb-4">
                        <div class="flex justify-between mb-2">
                            <span>小计：</span>
                            <span id="subtotal">¥0.00</span>
                        </div>
                        <div class="flex justify-between mb-2 text-green-600" id="discount">
                            <span>优惠：</span>
                            <span>¥0.00</span>
                        </div>
                        <div class="flex justify-between font-bold text-xl">
                            <span>总计：</span>
                            <span id="total">¥0.00</span>
                        </div>
                    </div>

                    <div class="flex gap-3">
                        <button id="clear-order" class="flex-1 btn-secondary">
                            <i class="fa fa-trash mr-1"></i> 清空订单
                        </button>
                        <button id="pay-btn" class="flex-1 btn-primary" disabled>
                            <i class="fa fa-credit-card mr-1"></i> 去支付
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- 付款模态框 -->
    <div id="payment-modal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 hidden">
        <div class="bg-white rounded-lg p-8 w-full max-w-md">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-2xl font-bold">确认支付</h3>
                <button id="close-payment" class="text-gray-500 hover:text-gray-700">
                    <i class="fa fa-times text-xl"></i>
                </button>
            </div>
            <div class="mb-6 text-center">
                <p class="text-xl mb-2">您的订单总金额为：</p>
                <p class="text-3xl font-bold text-primary" id="payment-amount">¥0.00</p>
            </div>
            <div class="flex gap-3">
                <button id="cancel-payment" class="flex-1 btn-secondary">取消</button>
                <button id="confirm-payment" class="flex-1 btn-primary">确认支付</button>
            </div>
        </div>
    </div>

    <!-- 支付成功后显示小票 -->
    <div id="receipt-modal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 hidden">
        <div class="receipt w-full max-w-md relative">
            <button id="close-receipt" class="absolute top-4 right-4 text-gray-500 hover:text-gray-700">
                <i class="fa fa-times text-xl"></i>
            </button>
            <div class="receipt-header">
                <h3 class="text-2xl font-bold mb-1">大蒜酒店</h3>
                <p class="text-sm text-gray-500">订餐电话：0577-8888 8888</p>
                <p class="text-sm text-gray-500 mt-1">交易时间：<span id="receipt-time">2025-07-07 12:34:56</span></p>
            </div>
            <div id="receipt-items" class="mb-4">
                <!-- 小票项目将通过JS动态生成 -->
            </div>
            <div class="flex justify-between receipt-total">
                <span>总计：</span>
                <span id="receipt-total">¥0.00</span>
            </div>
            <div class="mt-6 text-center">
                <p class="text-sm text-gray-500">感谢您的光临，期待再次为您服务！</p>
                <p class="text-sm text-gray-500 mt-1">注：炒豆子消费满80元免费赠送</p>
            </div>
        </div>
    </div>

    <!-- 页脚 -->
    <footer class="bg-dark text-white py-6 mt-12">
        <div class="container mx-auto px-4 text-center">
            <p>欢迎下次光临！</p>
            <p class="mt-2 text-gray-300">注：炒豆子消费满80元免费赠送</p>
        </div>
    </footer>

    <script>
        // 菜品数据
        const dishes = [
            { id: 1, name: '披萨', price: 50.00 },
            { id: 2, name: '雪花牛排', price: 99.90 },
            { id: 3, name: '腌黄瓜', price: 20.00 },
            { id: 4, name: '清蒸单虾', price: 15.50 },
            { id: 5, name: '番茄汤', price: 25.00 },
            { id: 6, name: '冰淇凌', price: 5.00 },
            { id: 7, name: '蒸玉米', price: 10.00 },
            { id: 8, name: '炒豆子', price: 13.80 },  // 满80元免费
            { id: 9, name: '茄葱', price: 28.50 },
            { id: 10, name: '洋葱', price: 2.50 },
            { id: 11, name: '煎香肠', price: 5.00 },
            { id: 12, name: '炒青椒', price: 18.00 },
            { id: 13, name: '蘑菇汤', price: 19.50 },
            { id: 14, name: '水果拼盘', price: 25.80 },
            { id: 15, name: '蔬菜拼盘', price: 30.60 },
            { id: 16, name: '红烧柠檬鱼（什么鱼都有）', price: 55.50 },
            { id: 17, name: '自己烧菜（食材自定义）', price: 20.00, isCustom: true },  // 自定义食材
            { id: 18, name: '米饭', price: 3.00 }
        ];

        // 已点菜品
        let orderItems = [];

        // DOM元素
        const menuContainer = document.querySelector('.grid');
        const orderItemsContainer = document.getElementById('order-items');
        const subtotalElement = document.getElementById('subtotal');
        const discountElement = document.getElementById('discount');
        const totalElement = document.getElementById('total');
        const payBtn = document.getElementById('pay-btn');
        const clearOrderBtn = document.getElementById('clear-order');
        const paymentModal = document.getElementById('payment-modal');
        const receiptModal = document.getElementById('receipt-modal');
        const receiptItemsContainer = document.getElementById('receipt-items');
        const receiptTotalElement = document.getElementById('receipt-total');
        const receiptTimeElement = document.getElementById('receipt-time');
        const closePaymentBtn = document.getElementById('close-payment');
        const cancelPaymentBtn = document.getElementById('cancel-payment');
        const confirmPaymentBtn = document.getElementById('confirm-payment');
        const closeReceiptBtn = document.getElementById('close-receipt');

        // 初始化菜单
        function initMenu() {
            dishes.forEach(dish => {
                const dishCard = document.createElement('div');
                dishCard.className = 'menu-card p-4';
                dishCard.innerHTML = `
                    <div class="flex justify-between items-start mb-4">
                        <h3 class="font-bold text-lg">${dish.name}</h3>
                        <span class="text-primary font-bold">¥${dish.price.toFixed(2)}</span>
                    </div>
                    <div class="flex justify-end">
                        <div class="flex items-center">
                            <button class="quantity-btn minus-btn" data-id="${dish.id}">
                                <i class="fa fa-minus"></i>
                            </button>
                            <input type="number" min="0" value="0" class="quantity-input w-12 mx-2 text-center" 
                                   data-id="${dish.id}" ${dish.isCustom ? '' : 'max="9"'}>
                            <button class="quantity-btn plus-btn" data-id="${dish.id}">
                                <i class="fa fa-plus"></i>
                            </button>
                        </div>
                    </div>
                `;
                menuContainer.appendChild(dishCard);
            });

            // 添加事件监听
            document.querySelectorAll('.plus-btn').forEach(btn => {
                btn.addEventListener('click', () => updateQuantity(btn.dataset.id, 1));
            });

            document.querySelectorAll('.minus-btn').forEach(btn => {
                btn.addEventListener('click', () => updateQuantity(btn.dataset.id, -1));
            });

            document.querySelectorAll('.quantity-input').forEach(input => {
                input.addEventListener('change', () => {
                    const quantity = parseInt(input.value) || 0;
                    updateQuantity(input.dataset.id, quantity - getCurrentQuantity(input.dataset.id));
                });
            });

            // 订单操作按钮
            clearOrderBtn.addEventListener('click', clearOrder);
            payBtn.addEventListener('click', openPaymentModal);
            closePaymentBtn.addEventListener('click', closePaymentModal);
            cancelPaymentBtn.addEventListener('click', closePaymentModal);
            confirmPaymentBtn.addEventListener('click', confirmPayment);
            closeReceiptBtn.addEventListener('click', closeReceiptModal);
        }

        // 获取当前数量
        function getCurrentQuantity(dishId) {
            const input = document.querySelector(`.quantity-input[data-id="${dishId}"]`);
            return parseInt(input.value) || 0;
        }

        // 更新数量
        function updateQuantity(dishId, change) {
            const dish = dishes.find(d => d.id === parseInt(dishId));
            const input = document.querySelector(`.quantity-input[data-id="${dishId}"]`);
            
            let currentQuantity = parseInt(input.value) || 0;
            let newQuantity = currentQuantity + change;
            
            // 确保数量不为负
            newQuantity = Math.max(0, newQuantity);
            
            // 更新输入框
            input.value = newQuantity;
            
            // 更新订单
            updateOrder(dish, newQuantity);
        }

        // 更新订单
        function updateOrder(dish, quantity) {
            // 查找是否已在订单中
            const existingItemIndex = orderItems.findIndex(item => item.id === dish.id);
            
            if (quantity > 0) {
                // 如果已存在，更新数量
                if (existingItemIndex !== -1) {
                    orderItems[existingItemIndex].quantity = quantity;
                } else {
                    // 否则添加新项
                    orderItems.push({
                        id: dish.id,
                        name: dish.name,
                        price: dish.price,
                        quantity: quantity,
                        isCustom: dish.isCustom || false
                    });
                }
            } else if (existingItemIndex !== -1) {
                // 如果数量为0且存在，则移除
                orderItems.splice(existingItemIndex, 1);
            }
            
            // 更新订单显示和总价
            renderOrderItems();
            calculateTotal();
        }

        // 渲染已点菜品
        function renderOrderItems() {
            if (orderItems.length === 0) {
                orderItemsContainer.innerHTML = '<p class="text-gray-500 text-center py-4">请选择菜品</p>';
                payBtn.disabled = true;
                return;
            }
            
            payBtn.disabled = false;
            orderItemsContainer.innerHTML = '';
            
            orderItems.forEach(item => {
                const itemElement = document.createElement('div');
                itemElement.className = 'flex justify-between py-2 border-b border-gray-100';
                itemElement.innerHTML = `
                    <div>
                        <span class="font-medium">${item.name}</span>
                        <span class="text-gray-500 ml-2">x${item.quantity}</span>
                    </div>
                    <span>¥${(item.price * item.quantity).toFixed(2)}</span>
                `;
                orderItemsContainer.appendChild(itemElement);
            });
        }

        // 计算总价
        function calculateTotal() {
            let subtotal = 0;
            let discount = 0;
            
            // 计算小计
            orderItems.forEach(item => {
                subtotal += item.price * item.quantity;
            });
            
            // 检查是否满足炒豆子免费条件
            const hasFriedBeans = orderItems.some(item => item.id === 8 && item.quantity > 0);
            if (hasFriedBeans && subtotal >= 80) {
                // 找到炒豆子并计算折扣
                const beansItem = orderItems.find(item => item.id === 8);
                discount = beansItem.price * beansItem.quantity;
            }
            
            // 计算总价
            const total = subtotal - discount;
            
            // 更新显示
            subtotalElement.textContent = `¥${subtotal.toFixed(2)}`;
            discountElement.querySelector('span:last-child').textContent = `¥${discount.toFixed(2)}`;
            totalElement.textContent = `¥${total.toFixed(2)}`;
            
            // 更新支付金额
            document.getElementById('payment-amount').textContent = `¥${total.toFixed(2)}`;
            
            return total;
        }

        // 清空订单
        function clearOrder() {
            if (orderItems.length === 0) return;
            
            if (confirm('确定要清空当前订单吗？')) {
                // 重置输入框
                document.querySelectorAll('.quantity-input').forEach(input => {
                    input.value = 0;
                });
                
                // 清空订单
                orderItems = [];
                renderOrderItems();
                calculateTotal();
            }
        }

        // 打开支付模态框
        function openPaymentModal() {
            const total = calculateTotal();
            if (total <= 0) return;
            
            paymentModal.classList.remove('hidden');
        }

        // 关闭支付模态框
        function closePaymentModal() {
            paymentModal.classList.add('hidden');
        }

        // 确认支付
        function confirmPayment() {
            // 关闭支付模态框
            paymentModal.classList.add('hidden');
            
            // 更新小票信息
            updateReceipt();
            
            // 显示小票
            receiptModal.classList.remove('hidden');
        }

        // 更新小票信息
        function updateReceipt() {
            // 设置交易时间
            const now = new Date();
            receiptTimeElement.textContent = now.toLocaleString('zh-CN');
            
            // 清空现有小票项目
            receiptItemsContainer.innerHTML = '';
            
            // 添加订单项目
            orderItems.forEach(item => {
                const itemElement = document.createElement('div');
                itemElement.className = 'receipt-item';
                itemElement.innerHTML = `
                    <span>${item.name} x${item.quantity}</span>
                    <span>¥${(item.price * item.quantity).toFixed(2)}</span>
                `;
                receiptItemsContainer.appendChild(itemElement);
            });
            
            // 添加优惠信息
            const subtotal = parseFloat(subtotalElement.textContent.replace('¥', ''));
            const discount = parseFloat(discountElement.querySelector('span:last-child').textContent.replace('¥', ''));
            
            if (discount > 0) {
                const discountElement = document.createElement('div');
                discountElement.className = 'receipt-item text-green-600';
                discountElement.innerHTML = `
                    <span>优惠</span>
                    <span>-¥${discount.toFixed(2)}</span>
                `;
                receiptItemsContainer.appendChild(discountElement);
            }
            
            // 设置总计
            receiptTotalElement.textContent = totalElement.textContent;
        }

        // 关闭小票模态框
        function closeReceiptModal() {
            receiptModal.classList.add('hidden');
            
            // 重置订单
            document.querySelectorAll('.quantity-input').forEach(input => {
                input.value = 0;
            });
            orderItems = [];
            renderOrderItems();
            calculateTotal();
        }

        // 初始化
        document.addEventListener('DOMContentLoaded', initMenu);
    </script>
</body>
</html>
