        tailwind.config = {

    <style type="text/tailwindcss">
        @layer utilities {
            .content-auto {

            }

            }
            .btn-primary {
                @apply bg-primary text-white px-4 py-2 rounded-md hover:bg-opacity-90 transition-all;
            }
            .btn-secondary {

            }
            .quantity-btn {

            }
            .receipt {

            }
            .receipt-header {
                @apply border-b border-gray-200 pb-4 mb-4;
            }
            .receipt-item {
                @apply flex justify-between py-1;
            }
            .receipt-total {
                @apply font-bold pt-2 border-t border-gray-200 mt-2;
            }
            .category-badge {
                @apply text-xs font-medium px-2.5 py-0.5 rounded-full;
            }
        }

</head>

                    <div id="cart-items" class="max-h-64 overflow-y-auto mb-4">

                        </div>
                        <div class="flex justify-between mb-2 text-green-600" id="discount">

                            <span>¥0.00</span>
                        </div>
                        <div class="flex justify-between font-bold text-xl">
                            <span>总计：</span>
                            <span id="total">¥0.00</span>
                        </div>
                    </div>

                    <div class="flex gap-3">
                        <button id="clear-cart" class="flex-1 btn-secondary">
                            <i class="fa fa-trash mr-1"></i> 清空购物车
                        </button>
                        <button id="pay-btn" class="flex-1 btn-primary" disabled>
                            <i class="fa fa-credit-card mr-1"></i> 去支付
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- 付款模态框 -->

        <div class="bg-white rounded-lg p-8 w-full max-w-md">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-2xl font-bold">确认支付</h3>
                <button id="close-payment" class="text-gray-500 hover:text-gray-700">
                    <i class="fa fa-times text-xl"></i>
                </button>
            </div>
            <div class="mb-6 text-center">
                <p class="text-xl mb-2">您的订单总金额为：</p>

            </div>

    </div>

        // 购物车数据
        let cart = [];

        // 分类数据
        const categories = [
            '全部商品', '碳酸饮料', '矿泉水', '果汁饮料', '茶饮料', 
            '咖啡饮料', '乳制品', '饼干糕点', '薯片膨化', '巧克力糖果',
            '坚果炒货', '方便面', '速食食品', '日用品', '个人护理',
            '零食糕点'
        ];

        // 初始化页面
        document.addEventListener('DOMContentLoaded', () => {
            renderProducts(products);
            updateCartDisplay();
            setupEventListeners();
        });

        // 设置事件监听器
        function setupEventListeners() {
            // 搜索按钮点击事件
            document.getElementById('search-btn').addEventListener('click', searchProducts);
            
            // 搜索输入框回车事件
            document.getElementById('search-input').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    searchProducts();
                }
            });
            
            // 清空购物车按钮
            document.getElementById('clear-cart').addEventListener('click', clearCart);
            
            // 支付按钮
            document.getElementById('pay-btn').addEventListener('click', () => {
                document.getElementById('payment-modal').classList.remove('hidden');
                document.getElementById('payment-amount').textContent = `¥${getTotal().toFixed(2)}`;
            });
            
            // 关闭支付模态框
            document.getElementById('close-payment').addEventListener('click', () => {
                document.getElementById('payment-modal').classList.add('hidden');
            });
            
            // 取消支付
            document.getElementById('cancel-payment').addEventListener('click', () => {
                document.getElementById('payment-modal').classList.add('hidden');
            });
            
            // 确认支付
            document.getElementById('confirm-payment').addEventListener('click', confirmPayment);
            
            // 关闭小票模态框
            document.getElementById('close-receipt').addEventListener('click', () => {
                document.getElementById('receipt-modal').classList.add('hidden');
            });
        }

        // 渲染商品列表
        function renderProducts(productsToRender) {
            const container = document.getElementById('products-container');
            container.innerHTML = '';
            
            if (productsToRender.length === 0) {
                container.innerHTML = '<p class="col-span-full text-center text-gray-500 py-8">没有找到匹配的商品</p>';
                return;
            }
            
            productsToRender.forEach(product => {
                const card = document.createElement('div');
                card.className = 'product-card';
                card.innerHTML = `
                    <div class="relative">
                        <img src="https://picsum.photos/seed/${product.id}/300/300" alt="${product.name}" class="w-full h-48 object-cover">
                        <span class="absolute top-2 left-2 category-badge bg-blue-100 text-blue-800">
                            ${product.category}
                        </span>
                    </div>
                    <div class="p-4">
                        <h3 class="font-bold text-lg mb-1">${product.name}</h3>
                        <p class="text-gray-600 text-sm mb-2">品牌: ${product.brand}</p>
                        <div class="flex justify-between items-center">
                            <span class="text-primary font-bold text-lg">¥${product.price.toFixed(2)}</span>
                            <button class="add-to-cart-btn bg-primary text-white px-3 py-1 rounded hover:bg-opacity-90 transition-all" 
                                    data-id="${product.id}">
                                <i class="fa fa-shopping-cart mr-1"></i> 添加
                            </button>
                        </div>
                    </div>
                `;
                container.appendChild(card);
                
                // 添加到购物车按钮事件
                card.querySelector('.add-to-cart-btn').addEventListener('click', () => {
                    addToCart(product.id);
                });
            });
        }

        // 添加商品到购物车
        function addToCart(productId) {
            const product = products.find(p => p.id === productId);
            if (!product) return;
            
            const cartItem = cart.find(item => item.id === productId);
            
            if (cartItem) {
                cartItem.quantity += 1;
            } else {
                cart.push({
                    id: product.id,
                    name: product.name,
                    price: product.price,
                    quantity: 1
                });
            }
            
            updateCartDisplay();
            showToast(`已添加 ${product.name} 到购物车`);
        }

        // 更新购物车显示
        function updateCartDisplay() {
            const cartItemsElement = document.getElementById('cart-items');
            const subtotalElement = document.getElementById('subtotal');
            const discountElement = document.getElementById('discount');
            const totalElement = document.getElementById('total');
            const payBtn = document.getElementById('pay-btn');
            
            // 如果购物车为空
            if (cart.length === 0) {
                cartItemsElement.innerHTML = '<p class="text-gray-500 text-center py-4">请选择商品</p>';
                subtotalElement.textContent = '¥0.00';
                discountElement.textContent = '¥0.00';
                totalElement.textContent = '¥0.00';
                payBtn.disabled = true;
                payBtn.classList.add('opacity-50', 'cursor-not-allowed');
                return;
            }
            
            // 启用支付按钮
            payBtn.disabled = false;
            payBtn.classList.remove('opacity-50', 'cursor-not-allowed');
            
            // 计算总价
            const subtotal = getSubtotal();
            const discount = getDiscount(subtotal);
            const total = subtotal - discount;
            
            // 更新购物车项目
            cartItemsElement.innerHTML = '';
            cart.forEach(item => {
                const itemElement = document.createElement('div');
                itemElement.className = 'flex justify-between items-center py-2 border-b border-gray-100 last:border-0';
                itemElement.innerHTML = `
                    <div>
                        <p class="font-medium">${item.name}</p>
                        <p class="text-sm text-gray-500">¥${item.price.toFixed(2)} × ${item.quantity}</p>
                    </div>
                    <div class="flex items-center">
                        <span class="text-primary font-bold mr-4">¥${(item.price * item.quantity).toFixed(2)}</span>
                        <div class="flex items-center">
                            <button class="decrease-quantity-btn quantity-btn" data-id="${item.id}">
                                <i class="fa fa-minus text-xs"></i>
                            </button>
                            <span class="mx-2">${item.quantity}</span>
                            <button class="increase-quantity-btn quantity-btn" data-id="${item.id}">
                                <i class="fa fa-plus text-xs"></i>
                            </button>
                        </div>
                    </div>
                `;
                cartItemsElement.appendChild(itemElement);
                
                // 减少数量按钮
                itemElement.querySelector('.decrease-quantity-btn').addEventListener('click', () => {
                    decreaseQuantity(item.id);
                });
                
                // 增加数量按钮
                itemElement.querySelector('.increase-quantity-btn').addEventListener('click', () => {
                    increaseQuantity(item.id);
                });
            });
            
            // 更新价格
            subtotalElement.textContent = `¥${subtotal.toFixed(2)}`;
            discountElement.textContent = `¥${discount.toFixed(2)}`;
            totalElement.textContent = `¥${total.toFixed(2)}`;
        }

        // 计算购物车小计
        function getSubtotal() {
            return cart.reduce((total, item) => total + (item.price * item.quantity), 0);
        }

        // 计算折扣
        function getDiscount(subtotal) {
            if (subtotal >= 200) {
                return 30;
            } else if (subtotal >= 100) {
                return 12;
            } else if (subtotal >= 50) {
                return 5;
            }
            return 0;
        }

        // 获取最终总价
        function getTotal() {
            return getSubtotal() - getDiscount(getSubtotal());
        }

        // 增加商品数量
        function increaseQuantity(productId) {
            const item = cart.find(item => item.id === productId);
            if (item) {
                item.quantity += 1;
                updateCartDisplay();
            }
        }

        // 减少商品数量
        function decreaseQuantity(productId) {
            const itemIndex = cart.findIndex(item => item.id === productId);
            if (itemIndex !== -1) {
                const item = cart[itemIndex];
                if (item.quantity > 1) {
                    item.quantity -= 1;
                } else {
                    cart.splice(itemIndex, 1);
                }
                updateCartDisplay();
            }
        }

        // 清空购物车
        function clearCart() {
            if (cart.length === 0) return;
            
            // 添加确认对话框
            if (confirm('确定要清空购物车吗？')) {
                cart = [];
                updateCartDisplay();
                showToast('购物车已清空');
            }
        }

        // 搜索商品
        function searchProducts() {
            const searchTerm = document.getElementById('search-input').value.toLowerCase().trim();
            
            if (!searchTerm) {
                renderProducts(products);
                return;
            }
            
            const filteredProducts = products.filter(product => 
                product.name.toLowerCase().includes(searchTerm) || 
                product.brand.toLowerCase().includes(searchTerm) ||
                product.category.toLowerCase().includes(searchTerm)
            );
            
            renderProducts(filteredProducts);
        }

        // 确认支付
        function confirmPayment() {
            // 隐藏支付模态框
            document.getElementById('payment-modal').classList.add('hidden');
            
            // 显示小票
            document.getElementById('receipt-modal').classList.remove('hidden');
            
            // 生成当前时间
            const now = new Date();
            const receiptTime = now.toLocaleString('zh-CN', {
                year: 'numeric',
                month: '2-digit',
                day: '2-digit',
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit'
            });
            document.getElementById('receipt-time').textContent = receiptTime;
            
            // 生成小票项目
            const receiptItemsElement = document.getElementById('receipt-items');
            receiptItemsElement.innerHTML = '';
            
            cart.forEach(item => {
                const itemElement = document.createElement('div');
                itemElement.className = 'receipt-item';
                itemElement.innerHTML = `
                    <span>${item.name} × ${item.quantity}</span>
                    <span>¥${(item.price * item.quantity).toFixed(2)}</span>
                `;
                receiptItemsElement.appendChild(itemElement);
            });
            
            // 添加折扣行
            const discount = getDiscount(getSubtotal());
            if (discount > 0) {
                const discountElement = document.createElement('div');
                discountElement.className = 'receipt-item text-green-600';
                discountElement.innerHTML = `
                    <span>优惠</span>
                    <span>-¥${discount.toFixed(2)}</span>
                `;
                receiptItemsElement.appendChild(discountElement);
            }
            
            // 显示总价
            document.getElementById('receipt-total').textContent = `¥${getTotal().toFixed(2)}`;
            
            // 清空购物车
            cart = [];
            updateCartDisplay();
        }

        // 显示提示消息
        function showToast(message) {
            // 检查是否已存在toast元素
            let toast = document.getElementById('toast-message');
            
            if (!toast) {
                // 创建toast元素
                toast = document.createElement('div');
                toast.id = 'toast-message';
                toast.className = 'fixed bottom-4 left-1/2 transform -translate-x-1/2 bg-dark text-white px-4 py-2 rounded-lg shadow-lg z-50 opacity-0 transition-opacity duration-300';
                document.body.appendChild(toast);
            }
            
            // 设置消息内容
            toast.textContent = message;
            
            // 显示toast
            toast.classList.remove('opacity-0');
            toast.classList.add('opacity-100');
            
            // 3秒后隐藏
            setTimeout(() => {
                toast.classList.remove('opacity-100');
                toast.classList.add('opacity-0');
            }, 3000);
        }
    </script>
