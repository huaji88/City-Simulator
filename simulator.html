<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>城市模拟器 · 服务导航</title>
    <style>
        /* 全局重置 & 字体 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #f5f7fa 0%, #e9edf5 100%);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 24px;
        }

        /* 主卡片 */
        .container {
            max-width: 1200px;
            width: 100%;
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 48px;
            padding: 48px 40px 56px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25),
                inset 0 1px 2px rgba(255, 255, 255, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.5);
            transition: all 0.2s ease;
        }

        /* 头部 */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            flex-wrap: wrap;
            gap: 16px 24px;
            margin-bottom: 40px;
            padding-bottom: 20px;
            border-bottom: 2px solid rgba(0, 0, 0, 0.06);
        }

        .header h1 {
            font-size: 32px;
            font-weight: 700;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, #1a2639, #3a4a6b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header .badge {
            font-size: 14px;
            font-weight: 500;
            color: #4a5a7a;
            background: rgba(255, 255, 255, 0.6);
            padding: 6px 18px;
            border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.8);
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.04);
            backdrop-filter: blur(4px);
        }

        /* 网格 — 响应式 */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
        }

        /* 按钮卡片 */
        .btn-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 255, 255, 0.8);
            border-radius: 28px;
            padding: 24px 12px 20px;
            text-decoration: none;
            color: #1e293b;
            box-shadow: 0 8px 20px -8px rgba(0, 0, 0, 0.08),
                0 0 0 1px rgba(255, 255, 255, 0.6) inset;
            transition: all 0.25s cubic-bezier(0.2, 0, 0, 1);
            cursor: pointer;
            min-height: 130px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        /* 微妙的悬停效果 */
        .btn-card::after {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 28px;
            background: radial-gradient(circle at 20% 30%, rgba(255, 255, 255, 0.4), transparent 70%);
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
        }

        .btn-card:hover {
            transform: translateY(-6px) scale(1.02);
            box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.20),
                0 0 0 1px rgba(255, 255, 255, 0.9) inset;
            background: rgba(255, 255, 255, 0.92);
            border-color: rgba(255, 255, 255, 0.95);
        }

        .btn-card:hover::after {
            opacity: 1;
        }

        .btn-card:active {
            transform: translateY(-2px) scale(0.98);
            transition-duration: 0.06s;
        }

        /* 序号徽标 */
        .btn-number {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 28px;
            height: 28px;
            border-radius: 40px;
            background: rgba(60, 80, 120, 0.08);
            color: #3a4a6b;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 0.02em;
            margin-bottom: 10px;
            border: 1px solid rgba(255, 255, 255, 0.5);
            flex-shrink: 0;
        }

        /* 主按钮文字 */
        .btn-label {
            font-size: 17px;
            font-weight: 600;
            letter-spacing: -0.01em;
            line-height: 1.3;
            color: #0f172a;
            margin-bottom: 4px;
            word-break: break-word;
        }

        /* 副标题 / 小提示 */
        .btn-sub {
            font-size: 12px;
            font-weight: 400;
            color: #5a6a8a;
            opacity: 0.7;
            letter-spacing: 0.02em;
            margin-top: 4px;
            border-top: 1px dashed rgba(0, 0, 0, 0.06);
            padding-top: 6px;
            width: 80%;
        }

        /* 不同颜色点缀 (纯装饰) */
        .btn-card:nth-child(1) .btn-number {
            background: rgba(239, 68, 68, 0.12);
            color: #b91c1c;
        }
        .btn-card:nth-child(2) .btn-number {
            background: rgba(59, 130, 246, 0.12);
            color: #1d4ed8;
        }
        .btn-card:nth-child(3) .btn-number {
            background: rgba(245, 158, 11, 0.14);
            color: #b45309;
        }
        .btn-card:nth-child(4) .btn-number {
            background: rgba(16, 185, 129, 0.13);
            color: #047857;
        }
        .btn-card:nth-child(5) .btn-number {
            background: rgba(139, 92, 246, 0.12);
            color: #6d28d9;
        }
        .btn-card:nth-child(6) .btn-number {
            background: rgba(236, 72, 153, 0.12);
            color: #be185d;
        }
        .btn-card:nth-child(7) .btn-number {
            background: rgba(14, 165, 233, 0.12);
            color: #0369a1;
        }
        .btn-card:nth-child(8) .btn-number {
            background: rgba(234, 179, 8, 0.14);
            color: #a16207;
        }
        .btn-card:nth-child(9) .btn-number {
            background: rgba(168, 85, 247, 0.12);
            color: #7e22ce;
        }
        .btn-card:nth-child(10) .btn-number {
            background: rgba(239, 68, 68, 0.10);
            color: #991b1b;
        }

        /* 小屏适配 */
        @media (max-width: 640px) {
            .container {
                padding: 28px 18px 32px;
                border-radius: 32px;
            }
            .header h1 {
                font-size: 26px;
            }
            .header .badge {
                font-size: 12px;
                padding: 4px 14px;
            }
            .grid {
                grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
                gap: 14px;
            }
            .btn-card {
                min-height: 110px;
                padding: 18px 8px 16px;
                border-radius: 22px;
            }
            .btn-label {
                font-size: 15px;
            }
            .btn-number {
                width: 24px;
                height: 24px;
                font-size: 11px;
                margin-bottom: 6px;
            }
            .btn-sub {
                font-size: 10px;
            }
        }

        @media (max-width: 420px) {
            .grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 10px;
            }
            .btn-card {
                min-height: 96px;
                padding: 14px 6px 12px;
                border-radius: 18px;
            }
            .btn-label {
                font-size: 13px;
            }
            .btn-number {
                width: 20px;
                height: 20px;
                font-size: 10px;
            }
            .btn-sub {
                display: none;
            }
        }

        /* 当按钮数量较少时保持美观 */
        @media (min-width: 800px) {
            .grid {
                grid-template-columns: repeat(5, 1fr);
            }
        }

        /* 点击波纹（纯视觉辅助） */
        .btn-card:focus-visible {
            outline: 3px solid #3b82f6;
            outline-offset: 2px;
        }

        /* 链接重置 */
        a.btn-card {
            text-decoration: none;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- 头部 -->

        <div class="grid">

    </div>

</body>
</html>
